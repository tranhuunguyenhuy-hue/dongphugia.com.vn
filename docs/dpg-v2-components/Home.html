<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>DPG — Trang Chủ</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css?v=2">
<style>
  body { background: #fff; overflow-x: hidden; }
  .container { max-width: 1440px; margin: 0 auto; padding: 0 80px; }
  .container-inner { padding: 0 32px; }
  section h3 { font-size: 24px; line-height: 32px; font-weight: 600; color: var(--stone-800); margin: 0; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Home() {
  const [mega, setMega] = useState(false);
  return <>
    <Header onOpenMega={setMega} megaOpen={mega} />
    <main className="container">
      <div className="container-inner" style={{ display: 'flex', flexDirection: 'column', gap: 32, padding: '0 32px 80px' }}>
        <HeroBanner />
        <PartnerRow />
        <CategoryGrid />
        <SubcategoryCarousel title="Thiết Bị Vệ Sinh" />
        <SubcategoryCarousel title="Thiết Bị Bếp" />
      </div>
    </main>
    <footer style={{ background: 'var(--stone-900)', color: 'var(--stone-300)', padding: '48px 80px', marginTop: 64 }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', display: 'grid', gridTemplateColumns: '1.2fr 1fr 1fr 1fr', gap: 48 }}>
        <div>
          <div style={{ background: '#fff', padding: '8px 12px', borderRadius: 8, display: 'inline-block' }}>
            <img src="../../assets/logo-dpg.png" alt="DPG" style={{ height: 32, display: 'block' }}/>
          </div>
          <p style={{ color: 'var(--stone-400)', marginTop: 16 }}>Đồng hành – Phát triển. Nhà phân phối thiết bị vệ sinh, bếp và gạch ốp lát uy tín.</p>
        </div>
        <div>
          <h5 style={{ color: '#fff', marginBottom: 12 }}>Sản phẩm</h5>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, fontSize: 14 }}>
            <a style={{ color: 'var(--stone-400)' }}>Thiết bị vệ sinh</a>
            <a style={{ color: 'var(--stone-400)' }}>Thiết bị bếp</a>
            <a style={{ color: 'var(--stone-400)' }}>Thiết bị nước</a>
            <a style={{ color: 'var(--stone-400)' }}>Gạch ốp lát</a>
          </div>
        </div>
        <div>
          <h5 style={{ color: '#fff', marginBottom: 12 }}>Công ty</h5>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, fontSize: 14 }}>
            <a style={{ color: 'var(--stone-400)' }}>Về chúng tôi</a>
            <a style={{ color: 'var(--stone-400)' }}>Dự án</a>
            <a style={{ color: 'var(--stone-400)' }}>Đối tác</a>
          </div>
        </div>
        <div>
          <h5 style={{ color: '#fff', marginBottom: 12 }}>Liên hệ</h5>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, fontSize: 14, color: 'var(--stone-400)' }}>
            <span>1900 0000</span>
            <span>contact@dongphugia.vn</span>
            <span>Hà Nội · TP.HCM</span>
          </div>
        </div>
      </div>
    </footer>
  </>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<Home />);
</script>
</body>
</html>
