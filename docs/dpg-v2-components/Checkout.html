<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>DPG — Thanh toán</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css?v=2">
<style>
  body { background: var(--stone-50); overflow-x: hidden; }
  .u-container { max-width: 1440px; padding: 0 80px; }
  h1, h2, h3, h4 { margin: 0; }
  .card { background: #fff; border: 1px solid var(--stone-200); border-radius: 16px; padding: 28px; }
  .card-title { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .card-title .num { width: 28px; height: 28px; border-radius: 9999px; background: var(--brand-500); color: #fff;
    font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="components2.jsx"></script>
<script type="text/babel" src="page-shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

const ITEMS = [
  { id: 1, name: 'Bồn Cầu TOTO CW762 Nắp Êm', img: '../../assets/thumb-toilet.png', qty: 1, price: 12750000 },
  { id: 2, name: 'Chậu Lavabo Đặt Bàn Inax L-300V', img: '../../assets/thumb-lavabo.png', qty: 2, price: 3750000 },
  { id: 3, name: 'Sen Tắm Nhiệt Độ Grohe', img: '../../assets/thumb-shower.png', qty: 1, price: 8900000 },
];

function Checkout() {
  const [ship, setShip] = useState('standard');
  const [pay, setPay] = useState('cod');
  const [invoice, setInvoice] = useState(false);
  const [city, setCity] = useState('hcm');

  const subtotal = ITEMS.reduce((s, it) => s + it.price * it.qty, 0);
  const shipping = ship === 'standard' ? 0 : ship === 'express' ? 350000 : 800000;
  const total = subtotal + shipping;

  return <PageShell>
    <div style={{ padding: '16px 0 24px' }}>
      <Breadcrumb items={[{ label: 'Trang chủ' }, { label: 'Giỏ hàng' }, { label: 'Thanh toán' }]}/>
    </div>

    <div style={{ marginBottom: 32 }}>
      <h1 style={{ fontFamily: 'var(--font-serif)', fontSize: 48, lineHeight: '56px', fontWeight: 700, color: 'var(--stone-900)', letterSpacing: '-.015em' }}>Thanh toán</h1>
      <p style={{ marginTop: 6, color: 'var(--stone-600)', fontSize: 15 }}>Hoàn tất đơn hàng trong 3 bước đơn giản</p>
    </div>

    <div style={{ display: 'grid', gridTemplateColumns: '1fr 420px', gap: 32, alignItems: 'flex-start' }}>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        {/* Contact */}
        <div className="card">
          <div className="card-title">
            <div className="num">1</div>
            <h3 style={{ fontSize: 18, fontWeight: 600 }}>Thông tin liên hệ</h3>
          </div>
          <div className="row2">
            <Input label="Họ và tên" placeholder="Nguyễn Văn A"/>
            <Input label="Số điện thoại" placeholder="09xx xxx xxx" type="tel"/>
          </div>
          <div style={{ marginTop: 12 }}>
            <Input label="Email" placeholder="ban@example.com" type="email"/>
          </div>
          <div style={{ marginTop: 12 }}>
            <Checkbox label="Tôi muốn nhận tư vấn lắp đặt qua điện thoại" checked onChange={() => {}}/>
          </div>
        </div>

        {/* Address */}
        <div className="card">
          <div className="card-title">
            <div className="num">2</div>
            <h3 style={{ fontSize: 18, fontWeight: 600 }}>Địa chỉ giao hàng</h3>
          </div>
          <Input label="Địa chỉ cụ thể" placeholder="Số nhà, tên đường" style={{ marginBottom: 12 }}/>
          <div className="row3">
            <Select label="Tỉnh / Thành phố" value={city} onChange={(e) => setCity(e.target.value)}
              options={[{value:'hcm',label:'TP. Hồ Chí Minh'},{value:'hn',label:'Hà Nội'},{value:'dn',label:'Đà Nẵng'},{value:'ct',label:'Cần Thơ'}]}/>
            <Select label="Quận / Huyện" options={[{value:'q1',label:'Quận 1'},{value:'q3',label:'Quận 3'},{value:'q7',label:'Quận 7'}]}/>
            <Select label="Phường / Xã" options={[{value:'p1',label:'Phường Bến Nghé'},{value:'p2',label:'Phường Đa Kao'}]}/>
          </div>
          <div style={{ marginTop: 12 }}>
            <Textarea label="Ghi chú (tùy chọn)" placeholder="Ví dụ: Giao giờ hành chính, gọi trước khi đến…" rows={3}/>
          </div>
        </div>

        {/* Shipping */}
        <div className="card">
          <div className="card-title">
            <div className="num">3</div>
            <h3 style={{ fontSize: 18, fontWeight: 600 }}>Phương thức vận chuyển</h3>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {[
              { k: 'standard', title: 'Giao hàng tiêu chuẩn', meta: '3–5 ngày làm việc', price: 'Miễn phí' },
              { k: 'express',  title: 'Giao hàng nhanh',       meta: '1–2 ngày làm việc', price: vnd(350000) },
              { k: 'install',  title: 'Giao & lắp đặt tận nơi', meta: 'Kèm kỹ thuật viên chuyên nghiệp', price: vnd(800000) },
            ].map(o => (
              <label key={o.k} onClick={() => setShip(o.k)}
                style={{ display: 'flex', gap: 14, padding: 16, border: `1px solid ${ship === o.k ? 'var(--brand-500)' : 'var(--stone-200)'}`,
                  borderRadius: 12, cursor: 'pointer', background: ship === o.k ? 'var(--brand-50)' : '#fff',
                  alignItems: 'center' }}>
                <Radio checked={ship === o.k} onChange={() => setShip(o.k)} name="ship"/>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 500, color: 'var(--stone-900)' }}>{o.title}</div>
                  <div style={{ fontSize: 13, color: 'var(--stone-500)', marginTop: 2 }}>{o.meta}</div>
                </div>
                <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--stone-900)', fontVariantNumeric: 'tabular-nums' }}>{o.price}</div>
              </label>
            ))}
          </div>
        </div>

        {/* Payment */}
        <div className="card">
          <div className="card-title">
            <div className="num">4</div>
            <h3 style={{ fontSize: 18, fontWeight: 600 }}>Phương thức thanh toán</h3>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {[
              { k: 'cod',      title: 'Thanh toán khi nhận hàng (COD)', meta: 'Kiểm tra hàng trước khi thanh toán' },
              { k: 'transfer', title: 'Chuyển khoản ngân hàng', meta: 'Vietcombank · Techcombank · MB Bank' },
              { k: 'card',     title: 'Thẻ tín dụng / ghi nợ', meta: 'Visa · Mastercard · JCB' },
              { k: 'momo',     title: 'Ví điện tử', meta: 'MoMo · ZaloPay · VNPay' },
            ].map(o => (
              <label key={o.k} onClick={() => setPay(o.k)}
                style={{ display: 'flex', gap: 12, padding: 16, border: `1px solid ${pay === o.k ? 'var(--brand-500)' : 'var(--stone-200)'}`,
                  borderRadius: 12, cursor: 'pointer', background: pay === o.k ? 'var(--brand-50)' : '#fff',
                  alignItems: 'flex-start' }}>
                <Radio checked={pay === o.k} onChange={() => setPay(o.k)} name="pay"/>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 500, color: 'var(--stone-900)' }}>{o.title}</div>
                  <div style={{ fontSize: 13, color: 'var(--stone-500)', marginTop: 2 }}>{o.meta}</div>
                </div>
              </label>
            ))}
          </div>
          <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--stone-200)' }}>
            <Checkbox label="Xuất hóa đơn VAT công ty" checked={invoice} onChange={() => setInvoice(!invoice)}/>
            {invoice && <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 12 }}>
              <Input label="Tên công ty" placeholder="Công ty TNHH ..."/>
              <div className="row2">
                <Input label="Mã số thuế"/>
                <Input label="Địa chỉ xuất hóa đơn"/>
              </div>
            </div>}
          </div>
        </div>
      </div>

      {/* Summary */}
      <aside className="card" style={{ padding: 24, position: 'sticky', top: 104, display: 'flex', flexDirection: 'column', gap: 16 }}>
        <h3 style={{ fontSize: 18, fontWeight: 600 }}>Đơn hàng của bạn ({ITEMS.length})</h3>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {ITEMS.map(it => (
            <div key={it.id} style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
              <div style={{ position: 'relative', width: 56, height: 56, borderRadius: 8,
                background: `var(--stone-50) url(${it.img}) center/contain no-repeat`, flexShrink: 0 }}>
                <div style={{ position: 'absolute', top: -6, right: -6, background: 'var(--stone-700)', color: '#fff',
                  width: 20, height: 20, borderRadius: 9999, fontSize: 11, fontWeight: 600,
                  display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{it.qty}</div>
              </div>
              <div style={{ flex: 1, fontSize: 13, color: 'var(--stone-800)', lineHeight: '18px' }}>{it.name}</div>
              <div style={{ fontSize: 14, fontWeight: 500, fontVariantNumeric: 'tabular-nums' }}>{vnd(it.price * it.qty)}</div>
            </div>
          ))}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, paddingTop: 16, borderTop: '1px solid var(--stone-200)', fontSize: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', color: 'var(--stone-600)' }}>
            <span>Tạm tính</span><span style={{ fontVariantNumeric: 'tabular-nums' }}>{vnd(subtotal)}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', color: 'var(--stone-600)' }}>
            <span>Vận chuyển</span><span style={{ fontVariantNumeric: 'tabular-nums' }}>{shipping === 0 ? 'Miễn phí' : vnd(shipping)}</span>
          </div>
        </div>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          paddingTop: 16, borderTop: '1px solid var(--stone-200)' }}>
          <span style={{ fontSize: 15, fontWeight: 600 }}>Tổng thanh toán</span>
          <span style={{ fontFamily: 'var(--font-serif)', fontSize: 28, fontWeight: 700, color: 'var(--brand-600)', fontVariantNumeric: 'tabular-nums' }}>{vnd(total)}</span>
        </div>

        <Button variant="primary" size="lg" style={{ height: 52, fontSize: 16 }}>Đặt hàng</Button>

        <div style={{ fontSize: 12, color: 'var(--stone-500)', textAlign: 'center', lineHeight: '18px' }}>
          Bằng việc đặt hàng, bạn đồng ý với <a style={{ color: 'var(--brand-500)' }}>Điều khoản dịch vụ</a> và <a style={{ color: 'var(--brand-500)' }}>Chính sách bảo mật</a> của DPG.
        </div>
      </aside>
    </div>
  </PageShell>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<Checkout/>);
</script>
</body></html>
