<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>DPG — Liên hệ tư vấn</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css?v=2">
<style>
  body { background: #fff; overflow-x: hidden; }
  .u-container { max-width: 1440px; padding: 0 80px; }
  h1, h2, h3 { margin: 0; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="components2.jsx"></script>
<script type="text/babel" src="page-shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

const BRANCHES = [
  { city: 'TP. Hồ Chí Minh (Trụ sở chính)',
    addr: '142 Nguyễn Văn Trỗi, Phường 8, Quận Phú Nhuận',
    phone: '028 3997 1234', hours: 'T2 – T7 · 8:00 – 18:00' },
  { city: 'Hà Nội',
    addr: '278 Cầu Giấy, Phường Quan Hoa, Quận Cầu Giấy',
    phone: '024 3795 5678', hours: 'T2 – T7 · 8:30 – 18:00' },
  { city: 'Đà Nẵng',
    addr: '55 Nguyễn Văn Linh, Phường Bình Hiên, Quận Hải Châu',
    phone: '0236 3888 999', hours: 'T2 – T7 · 8:30 – 17:30' },
];

function Contact() {
  const [sent, setSent] = useState(false);
  const [topic, setTopic] = useState('consult');

  return <PageShell>
    <div style={{ padding: '16px 0 24px' }}>
      <Breadcrumb items={[{ label: 'Trang chủ' }, { label: 'Liên hệ' }]}/>
    </div>

    {/* Editorial hero */}
    <div style={{ display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: 64, alignItems: 'center',
      padding: '32px 0 64px', borderBottom: '1px solid var(--stone-200)' }}>
      <div>
        <div style={{ fontSize: 13, letterSpacing: '.14em', textTransform: 'uppercase',
          color: 'var(--brand-500)', fontWeight: 600, marginBottom: 18 }}>Liên hệ với chúng tôi</div>
        <h1 style={{ fontFamily: 'var(--font-serif)', fontSize: 72, lineHeight: '78px',
          fontWeight: 700, color: 'var(--stone-900)', letterSpacing: '-.02em' }}>
          Đồng hành cùng <em style={{ color: 'var(--accent-500)', fontWeight: 500 }}>ngôi nhà</em> của bạn
        </h1>
        <p style={{ marginTop: 20, fontSize: 17, lineHeight: '28px', color: 'var(--stone-600)', maxWidth: 520 }}>
          Đội ngũ tư vấn viên chuyên nghiệp của Đồng Phú Gia sẵn sàng hỗ trợ bạn lựa chọn thiết bị phù hợp, báo giá dự án và lắp đặt tận nơi.
        </p>
        <div style={{ display: 'flex', gap: 32, marginTop: 36, paddingTop: 24, borderTop: '1px solid var(--stone-200)' }}>
          <QuickStat label="Hotline toàn quốc" value="1900 0000"/>
          <QuickStat label="Email" value="contact@dongphugia.vn"/>
          <QuickStat label="Zalo OA" value="@dongphugia"/>
        </div>
      </div>

      <div style={{ position: 'relative', aspectRatio: '4/5', borderRadius: 16, overflow: 'hidden',
        background: `var(--stone-100) url(../../assets/hero-banner.png) center/cover`,
        boxShadow: 'var(--shadow-lg)' }}>
        <div style={{ position: 'absolute', inset: 0, background:
          'linear-gradient(180deg, rgba(15,23,42,0) 40%, rgba(15,23,42,.55) 100%)' }}/>
        <div style={{ position: 'absolute', left: 24, bottom: 24, right: 24, color: '#fff' }}>
          <div style={{ fontSize: 12, letterSpacing: '.12em', textTransform: 'uppercase', opacity: .8 }}>Showroom</div>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 26, fontWeight: 600, marginTop: 6 }}>Trải nghiệm thiết bị trực tiếp tại 3 showroom trên toàn quốc</div>
        </div>
      </div>
    </div>

    {/* Form + branches */}
    <div style={{ display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: 48, padding: '72px 0' }}>

      <div>
        <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 36, fontWeight: 700, color: 'var(--stone-900)',
          letterSpacing: '-.01em' }}>Gửi yêu cầu tư vấn</h2>
        <p style={{ marginTop: 8, color: 'var(--stone-600)', fontSize: 15 }}>Chúng tôi sẽ phản hồi trong vòng 4 giờ làm việc.</p>

        <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 16 }}>
          {sent && <Alert variant="success" title="Đã gửi yêu cầu thành công" onClose={() => setSent(false)}>
            Cảm ơn bạn đã liên hệ với Đồng Phú Gia. Chuyên viên sẽ gọi lại trong vòng 4 giờ.
          </Alert>}

          <div>
            <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--stone-700)', marginBottom: 10 }}>Nội dung cần tư vấn</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {[
                { k: 'consult', l: 'Tư vấn sản phẩm' },
                { k: 'quote',   l: 'Báo giá dự án' },
                { k: 'install', l: 'Lắp đặt · bảo trì' },
                { k: 'partner', l: 'Hợp tác đại lý' },
                { k: 'other',   l: 'Khác' },
              ].map(o => (
                <button key={o.k} onClick={() => setTopic(o.k)}
                  style={{ padding: '8px 16px', borderRadius: 9999, fontFamily: 'inherit', fontSize: 14, fontWeight: 500,
                    border: `1px solid ${topic === o.k ? 'var(--brand-500)' : 'var(--stone-300)'}`,
                    background: topic === o.k ? 'var(--brand-50)' : '#fff',
                    color: topic === o.k ? 'var(--brand-600)' : 'var(--stone-700)', cursor: 'pointer' }}>
                  {o.l}
                </button>
              ))}
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <Input label="Họ và tên *" placeholder="Nguyễn Văn A"/>
            <Input label="Số điện thoại *" placeholder="09xx xxx xxx" type="tel"/>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <Input label="Email" type="email" placeholder="ban@example.com"/>
            <Select label="Khu vực" options={[
              { value: 'hcm', label: 'TP. Hồ Chí Minh' },
              { value: 'hn',  label: 'Hà Nội' },
              { value: 'dn',  label: 'Đà Nẵng' },
              { value: 'other', label: 'Tỉnh thành khác' },
            ]}/>
          </div>
          <Textarea label="Nội dung chi tiết" rows={5}
            placeholder="Mô tả nhu cầu của bạn, ví dụ: diện tích phòng tắm, ngân sách dự kiến, dòng sản phẩm quan tâm…"/>

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
            <Checkbox label="Tôi đồng ý với chính sách bảo mật thông tin" checked onChange={() => {}}/>
            <Button variant="primary" size="lg" style={{ height: 48, minWidth: 180 }}
              icon={<Icon.Phone width={18} height={18}/>}
              onClick={() => setSent(true)}>Gửi yêu cầu</Button>
          </div>
        </div>
      </div>

      <aside style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 36, fontWeight: 700, color: 'var(--stone-900)',
          letterSpacing: '-.01em' }}>Showroom</h2>

        {BRANCHES.map((b, i) => (
          <div key={i} style={{ padding: 24, border: '1px solid var(--stone-200)', borderRadius: 16,
            background: i === 0 ? 'var(--brand-50)' : '#fff' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
              <h3 style={{ fontSize: 17, fontWeight: 600, color: 'var(--stone-900)' }}>{b.city}</h3>
              {i === 0 && <Badge variant="brand">Trụ sở chính</Badge>}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, fontSize: 14, color: 'var(--stone-700)' }}>
              <div style={{ display: 'flex', gap: 10 }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--stone-500)', flexShrink: 0, marginTop: 1 }}>
                  <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/>
                </svg>
                <span>{b.addr}</span>
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <Icon.Phone width={18} height={18} style={{ color: 'var(--stone-500)', flexShrink: 0, marginTop: 1 }}/>
                <span style={{ fontVariantNumeric: 'tabular-nums' }}>{b.phone}</span>
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--stone-500)', flexShrink: 0, marginTop: 1 }}>
                  <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                <span>{b.hours}</span>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
              <Button variant="outline" size="sm" icon={<Icon.Phone width={14} height={14}/>}>Gọi ngay</Button>
              <Button variant="ghost" size="sm">Chỉ đường →</Button>
            </div>
          </div>
        ))}
      </aside>
    </div>

    {/* FAQ */}
    <div style={{ padding: '64px 0', borderTop: '1px solid var(--stone-200)' }}>
      <div style={{ textAlign: 'center', marginBottom: 40 }}>
        <div style={{ fontSize: 13, letterSpacing: '.14em', textTransform: 'uppercase',
          color: 'var(--brand-500)', fontWeight: 600, marginBottom: 12 }}>Câu hỏi thường gặp</div>
        <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 40, fontWeight: 700, color: 'var(--stone-900)',
          letterSpacing: '-.01em' }}>Những thắc mắc phổ biến</h2>
      </div>
      <div style={{ maxWidth: 820, margin: '0 auto' }}>
        <AccordionItem title="DPG có hỗ trợ lắp đặt tận nơi không?" defaultOpen>
          Có. Chúng tôi cung cấp dịch vụ lắp đặt chuyên nghiệp trong phạm vi Hà Nội, TP.HCM và Đà Nẵng. Các tỉnh thành khác có thể được hỗ trợ theo yêu cầu.
        </AccordionItem>
        <AccordionItem title="Chính sách bảo hành của sản phẩm như thế nào?">
          Mọi sản phẩm chính hãng đều có bảo hành từ 2 đến 10 năm tùy theo hãng. TOTO, Grohe, Kohler bảo hành chính hãng đúng với chính sách nhà sản xuất.
        </AccordionItem>
        <AccordionItem title="Tôi có thể xem sản phẩm trực tiếp ở đâu?">
          Ba showroom DPG tại Hà Nội, TP.HCM và Đà Nẵng trưng bày đầy đủ các dòng sản phẩm chủ lực. Chúng tôi đặt lịch tư vấn riêng để bạn trải nghiệm tốt nhất.
        </AccordionItem>
        <AccordionItem title="DPG có chính sách cho nhà thầu và dự án không?">
          Có chương trình chiết khấu dành cho đại lý, nhà thầu và dự án BĐS. Vui lòng gửi yêu cầu qua form "Báo giá dự án" để nhận báo giá chi tiết.
        </AccordionItem>
      </div>
    </div>
  </PageShell>;
}

function QuickStat({ label, value }) {
  return <div>
    <div style={{ fontSize: 12, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--stone-500)', fontWeight: 600 }}>{label}</div>
    <div style={{ fontSize: 18, fontWeight: 600, color: 'var(--stone-900)', marginTop: 4, fontVariantNumeric: 'tabular-nums' }}>{value}</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<Contact/>);
</script>
</body></html>
