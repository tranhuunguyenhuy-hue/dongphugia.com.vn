<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>DPG — Bồn cầu TOTO CW762</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css?v=2">
<style>
  body { background: #fff; overflow-x: hidden; }
  .u-container { max-width: 1440px; padding: 0 80px; }
  section h3 { font-size: 24px; line-height: 32px; font-weight: 600; margin: 0; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="components2.jsx"></script>
<script type="text/babel" src="page-shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

const IMAGES = [
  '../../assets/thumb-toilet.png',
  '../../assets/thumb-toilet-lid.png',
  '../../assets/thumb-lavabo.png',
  '../../assets/thumb-accessories.png',
];

const RELATED = [
  { name: 'Bồn Cầu TOTO MS884', brand: 'TOTO',  img: '../../assets/thumb-toilet.png',     price: 9800000,  originalPrice: 11500000, rating: 4.5, reviews: 86 },
  { name: 'Nắp Bồn Cầu Êm TC393', brand: 'TOTO', img: '../../assets/thumb-toilet-lid.png', price: 2100000,  rating: 4.7, reviews: 42 },
  { name: 'Chậu Lavabo Đặt Bàn Inax', brand: 'INAX', img: '../../assets/thumb-lavabo.png', price: 3750000,  originalPrice: 4200000, rating: 4.3, reviews: 64 },
  { name: 'Vòi Lavabo Nóng Lạnh',    brand: 'TOTO', img: '../../assets/thumb-lavabo-faucet.png', price: 4500000, rating: 4.6, reviews: 51 },
];

function Gallery() {
  const [i, setI] = useState(0);
  return <div style={{ display: 'flex', gap: 16 }}>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {IMAGES.map((src, idx) => (
        <button key={idx} onClick={() => setI(idx)}
          style={{ width: 72, height: 72, borderRadius: 8, padding: 4,
            border: `1px solid ${idx === i ? 'var(--brand-500)' : 'var(--stone-200)'}`,
            background: `#fff url(${src}) center/contain no-repeat`, cursor: 'pointer' }}/>
      ))}
    </div>
    <div style={{ flex: 1, aspectRatio: '1/1', background: `var(--stone-50) url(${IMAGES[i]}) center/contain no-repeat`,
      borderRadius: 16, border: '1px solid var(--stone-200)' }}/>
  </div>;
}

function Buy() {
  const [qty, setQty] = useState(1);
  const [color, setColor] = useState('white');
  const [modal, setModal] = useState(false);
  const [alert, setAlert] = useState(false);
  return <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
    <div style={{ fontSize: 12, color: 'var(--stone-500)', letterSpacing: '.06em', textTransform: 'uppercase' }}>TOTO</div>
    <h2 style={{ fontSize: 32, lineHeight: '40px' }}>Bồn Cầu Một Khối CW762 Nắp Êm</h2>
    <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
      <Rating value={4.2} size={16}/>
      <span style={{ color: 'var(--stone-400)' }}>·</span>
      <a style={{ fontSize: 14 }}>128 đánh giá</a>
      <span style={{ color: 'var(--stone-400)' }}>·</span>
      <Badge variant="success">Còn hàng</Badge>
    </div>

    <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, padding: '16px 0', borderTop: '1px solid var(--stone-200)', borderBottom: '1px solid var(--stone-200)' }}>
      <span style={{ fontSize: 36, fontWeight: 700, color: 'var(--accent-500)', fontVariantNumeric: 'tabular-nums' }}>{vnd(12750000)}</span>
      <span style={{ fontSize: 18, color: 'var(--stone-500)', textDecoration: 'line-through', fontVariantNumeric: 'tabular-nums' }}>{vnd(15000000)}</span>
      <Badge variant="accent" style={{ fontSize: 14, padding: '4px 12px' }}>-15%</Badge>
    </div>

    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--stone-700)' }}>Màu sắc</div>
      <div style={{ display: 'flex', gap: 10 }}>
        {[{k:'white',n:'Trắng'},{k:'pearl',n:'Trắng ngọc'},{k:'beige',n:'Be kem'}].map(c => (
          <button key={c.k} onClick={() => setColor(c.k)}
            style={{ padding: '8px 16px', borderRadius: 8, fontFamily: 'inherit', fontSize: 14, fontWeight: 500,
              border: `1px solid ${color === c.k ? 'var(--brand-500)' : 'var(--stone-300)'}`,
              background: color === c.k ? 'var(--brand-50)' : '#fff',
              color: color === c.k ? 'var(--brand-600)' : 'var(--stone-700)', cursor: 'pointer' }}>
            {c.n}
          </button>
        ))}
      </div>
    </div>

    <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
      <QtyStepper value={qty} onChange={setQty}/>
      <span style={{ fontSize: 13, color: 'var(--stone-500)' }}>Còn 12 sản phẩm</span>
    </div>

    <div style={{ display: 'flex', gap: 12, marginTop: 4 }}>
      <Button variant="primary" size="lg" style={{ flex: 1, height: 48 }}
        icon={<Icon.Phone width={18} height={18}/>}>Liên hệ tư vấn</Button>
      <Button variant="secondary" size="lg" style={{ flex: 1, height: 48 }}
        icon={<Icon.Cart width={18} height={18}/>} onClick={() => setAlert(true)}>Thêm vào giỏ</Button>
    </div>

    {alert && <Alert variant="success" title="Đã thêm vào giỏ" onClose={() => setAlert(false)}>
      Bồn cầu TOTO CW762 đã được thêm (SL: {qty}). <a href="./Cart.html" style={{ color: 'var(--brand-500)', fontWeight: 500 }}>Xem giỏ hàng →</a>
    </Alert>}

    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, padding: 16, background: 'var(--stone-50)', borderRadius: 12 }}>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', fontSize: 14, color: 'var(--stone-700)' }}>
        <Icon2.Box width={18} height={18} style={{ color: 'var(--brand-500)' }}/>
        Giao miễn phí nội thành Hà Nội & TP.HCM cho đơn ≥ 5.000.000₫
      </div>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', fontSize: 14, color: 'var(--stone-700)' }}>
        <Icon2.Check width={18} height={18} style={{ color: 'var(--success)' }}/>
        Bảo hành chính hãng 5 năm
      </div>
      <a onClick={() => setModal(true)} style={{ fontSize: 14, color: 'var(--brand-500)', cursor: 'pointer', fontWeight: 500, marginTop: 4 }}>
        Xem chính sách đổi trả →
      </a>
    </div>

    <Modal open={modal} onClose={() => setModal(false)} title="Chính sách đổi trả"
      footer={<><Button variant="outline" onClick={() => setModal(false)}>Đóng</Button>
               <Button variant="primary" onClick={() => setModal(false)}>Tôi hiểu</Button></>}>
      <p style={{ marginBottom: 12 }}>Đồng Phú Gia cam kết đổi/trả sản phẩm trong vòng 7 ngày kể từ ngày nhận hàng nếu:</p>
      <ul style={{ paddingLeft: 20, color: 'var(--stone-700)', lineHeight: '26px' }}>
        <li>Sản phẩm còn nguyên đai, nguyên kiện, chưa lắp đặt.</li>
        <li>Lỗi kỹ thuật do nhà sản xuất.</li>
        <li>Không đúng mẫu mã, màu sắc đã đặt.</li>
      </ul>
    </Modal>
  </div>;
}

function PDP() {
  const [tab, setTab] = useState('desc');
  return <PageShell>
    <div style={{ padding: '16px 0' }}>
      <Breadcrumb items={[
        { label: 'Trang chủ' },
        { label: 'Thiết bị vệ sinh' },
        { label: 'Bồn cầu' },
        { label: 'TOTO CW762' },
      ]}/>
    </div>

    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, marginTop: 16 }}>
      <Gallery/>
      <Buy/>
    </div>

    <div style={{ marginTop: 64 }}>
      <Tabs value={tab} onChange={setTab} tabs={[
        { value: 'desc', label: 'Mô tả sản phẩm' },
        { value: 'spec', label: 'Thông số kỹ thuật' },
        { value: 'rev',  label: 'Đánh giá (128)' },
        { value: 'install', label: 'Hướng dẫn lắp đặt' },
      ]}/>
      <div style={{ padding: '32px 0', maxWidth: 800 }}>
        {tab === 'desc' && <div style={{ display: 'flex', flexDirection: 'column', gap: 12, color: 'var(--stone-700)', fontSize: 16, lineHeight: '26px' }}>
          <p>Bồn cầu một khối TOTO CW762 là dòng sản phẩm cao cấp được thiết kế với công nghệ xả Tornado Flush độc quyền, giúp làm sạch hiệu quả chỉ với 4.8L nước.</p>
          <p>Men sứ CeFiONtect chống bám bẩn, duy trì bề mặt sáng bóng theo thời gian. Nắp êm tự động hạ nhẹ, an toàn cho người dùng và bền bỉ với thiết kế đơn khối liền mạch.</p>
        </div>}
        {tab === 'spec' && <div style={{ display: 'grid', gridTemplateColumns: '200px 1fr', gap: '10px 32px', fontSize: 15 }}>
          <div style={{ color: 'var(--stone-500)' }}>Kích thước</div><div>700 × 385 × 705 mm</div>
          <div style={{ color: 'var(--stone-500)' }}>Lưu lượng xả</div><div>4.8 / 3.0 L</div>
          <div style={{ color: 'var(--stone-500)' }}>Công nghệ xả</div><div>Tornado Flush</div>
          <div style={{ color: 'var(--stone-500)' }}>Men sứ</div><div>CeFiONtect</div>
          <div style={{ color: 'var(--stone-500)' }}>Xuất xứ</div><div>Việt Nam (TOTO Vietnam)</div>
          <div style={{ color: 'var(--stone-500)' }}>Bảo hành</div><div>5 năm chính hãng</div>
        </div>}
        {tab === 'rev' && <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {[
            {n:'Nguyễn Văn A', r:5, t:'Sản phẩm tốt, lắp đặt nhanh. Dùng 2 tuần vẫn sáng như mới.'},
            {n:'Trần Thị B',   r:4, t:'Chất lượng ổn, giao hàng đúng hẹn. Hơi đắt so với kỳ vọng.'},
            {n:'Lê Minh C',    r:5, t:'Nắp êm rất thích, tiết kiệm nước thật.'},
          ].map((r, i) => (
            <div key={i} style={{ padding: 16, background: 'var(--stone-50)', borderRadius: 12 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                <strong style={{ fontSize: 14 }}>{r.n}</strong>
                <Rating value={r.r} size={14}/>
              </div>
              <p style={{ fontSize: 14, color: 'var(--stone-700)' }}>{r.t}</p>
            </div>
          ))}
        </div>}
        {tab === 'install' && <div>
          <AccordionItem title="Chuẩn bị mặt sàn" defaultOpen>
            Đảm bảo sàn phẳng, khô ráo. Khoảng cách tâm xả đến tường chuẩn 305mm.
          </AccordionItem>
          <AccordionItem title="Kết nối ống thoát">
            Dùng gioăng silicon chất lượng, siết đều vòng bulông.
          </AccordionItem>
          <AccordionItem title="Kiểm tra sau khi lắp">
            Xả thử 5 lần, kiểm tra độ kín nước và góc ngồi.
          </AccordionItem>
        </div>}
      </div>
    </div>

    <div style={{ marginTop: 48 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <h3>Sản phẩm liên quan</h3>
        <a style={{ fontSize: 14, color: 'var(--brand-500)', fontWeight: 500 }}>Xem tất cả →</a>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
        {RELATED.map((p, i) => <ProductCard key={i} {...p}/>)}
      </div>
    </div>
  </PageShell>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<PDP/>);
</script>
</body></html>
