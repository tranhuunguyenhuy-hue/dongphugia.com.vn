<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>DPG — Giỏ hàng</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css?v=2">
<style>
  body { background: var(--stone-50); overflow-x: hidden; }
  .u-container { max-width: 1440px; padding: 0 80px; }
  h1, h2, h3 { margin: 0; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="components2.jsx"></script>
<script type="text/babel" src="page-shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

const INITIAL = [
  { id: 1, name: 'Bồn Cầu Một Khối TOTO CW762 Nắp Êm', brand: 'TOTO',
    option: 'Màu: Trắng', img: '../../assets/thumb-toilet.png',
    price: 12750000, originalPrice: 15000000, qty: 1, stock: 12 },
  { id: 2, name: 'Chậu Lavabo Đặt Bàn Inax L-300V', brand: 'INAX',
    option: 'Kích thước: 500×400mm', img: '../../assets/thumb-lavabo.png',
    price: 3750000, originalPrice: 4200000, qty: 2, stock: 20 },
  { id: 3, name: 'Sen Tắm Nhiệt Độ Cao Cấp', brand: 'GROHE',
    option: 'Màu: Chrome', img: '../../assets/thumb-shower.png',
    price: 8900000, qty: 1, stock: 6 },
];

function CartRow({ it, onQty, onRemove }) {
  return <div style={{ display: 'grid', gridTemplateColumns: '96px 1fr 140px 140px 40px',
    gap: 20, alignItems: 'center', padding: 20, background: '#fff', borderRadius: 12,
    border: '1px solid var(--stone-200)' }}>
    <div style={{ width: 96, height: 96, borderRadius: 8, background: `var(--stone-50) url(${it.img}) center/contain no-repeat` }}/>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
      <div style={{ fontSize: 11, color: 'var(--stone-500)', letterSpacing: '.06em', textTransform: 'uppercase', fontWeight: 600 }}>{it.brand}</div>
      <div style={{ fontSize: 16, fontWeight: 500, color: 'var(--stone-900)', lineHeight: '22px' }}>{it.name}</div>
      <div style={{ fontSize: 13, color: 'var(--stone-500)', marginTop: 2 }}>{it.option}</div>
      <div style={{ fontSize: 12, color: 'var(--success)', marginTop: 4, display: 'flex', alignItems: 'center', gap: 4 }}>
        <Icon2.Check width={14} height={14}/> Còn {it.stock} sản phẩm
      </div>
    </div>
    <QtyStepper value={it.qty} onChange={(q) => onQty(it.id, q)} max={it.stock}/>
    <div style={{ textAlign: 'right' }}>
      <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--stone-900)', fontVariantNumeric: 'tabular-nums' }}>{vnd(it.price * it.qty)}</div>
      {it.originalPrice && <div style={{ fontSize: 13, color: 'var(--stone-500)', textDecoration: 'line-through', fontVariantNumeric: 'tabular-nums' }}>{vnd(it.originalPrice * it.qty)}</div>}
    </div>
    <IconButton variant="ghost" icon={<Icon2.X/>} onClick={() => onRemove(it.id)}/>
  </div>;
}

function Cart() {
  const [items, setItems] = useState(INITIAL);
  const [coupon, setCoupon] = useState('');
  const [couponApplied, setCouponApplied] = useState(false);

  const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
  const original = items.reduce((s, it) => s + (it.originalPrice ?? it.price) * it.qty, 0);
  const savings = original - subtotal;
  const shipping = subtotal >= 5000000 ? 0 : 150000;
  const couponDiscount = couponApplied ? Math.round(subtotal * 0.05) : 0;
  const total = subtotal + shipping - couponDiscount;

  const onQty = (id, q) => setItems(items.map(it => it.id === id ? { ...it, qty: q } : it));
  const onRemove = (id) => setItems(items.filter(it => it.id !== id));

  return <PageShell>
    <div style={{ padding: '16px 0 24px' }}>
      <Breadcrumb items={[{ label: 'Trang chủ' }, { label: 'Giỏ hàng' }]}/>
    </div>

    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 32 }}>
      <div>
        <h1 style={{ fontFamily: 'var(--font-serif)', fontSize: 48, lineHeight: '56px', fontWeight: 700, color: 'var(--stone-900)', letterSpacing: '-.015em' }}>Giỏ hàng</h1>
        <p style={{ marginTop: 6, color: 'var(--stone-600)', fontSize: 15 }}>{items.length} sản phẩm · Kiểm tra trước khi thanh toán</p>
      </div>
      <a href="./Home.html" style={{ fontSize: 14, color: 'var(--brand-500)', fontWeight: 500, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
        <Icon.ChevLeft width={16} height={16}/> Tiếp tục mua sắm
      </a>
    </div>

    {items.length === 0 ? (
      <div style={{ background: '#fff', borderRadius: 16, border: '1px solid var(--stone-200)' }}>
        <EmptyState title="Giỏ hàng của bạn đang trống"
          description="Khám phá các sản phẩm thiết bị vệ sinh, bếp và gạch ốp lát cao cấp của Đồng Phú Gia."
          action={<Button variant="primary" size="lg">Bắt đầu mua sắm</Button>}/>
      </div>
    ) : (
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 400px', gap: 32, alignItems: 'flex-start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {items.map(it => <CartRow key={it.id} it={it} onQty={onQty} onRemove={onRemove}/>)}

          <Alert variant="info" title="Giao miễn phí toàn quốc">
            Đơn hàng ≥ 5.000.000₫ được miễn phí vận chuyển. Bạn đang {subtotal >= 5000000 ? 'đủ điều kiện' : `cần thêm ${vnd(5000000 - subtotal)}`}.
          </Alert>
        </div>

        <aside style={{ background: '#fff', borderRadius: 16, border: '1px solid var(--stone-200)',
          padding: 24, display: 'flex', flexDirection: 'column', gap: 16, position: 'sticky', top: 104 }}>
          <h3 style={{ fontSize: 18, fontWeight: 600 }}>Tóm tắt đơn hàng</h3>

          <div style={{ display: 'flex', gap: 8 }}>
            <Input placeholder="Mã giảm giá" value={coupon} onChange={(e) => setCoupon(e.target.value)} style={{ flex: 1 }}/>
            <Button variant="outline" onClick={() => setCouponApplied(!!coupon)} style={{ height: 46, marginTop: 'auto' }}>Áp dụng</Button>
          </div>
          {couponApplied && <Badge variant="success">Đã áp dụng: {coupon.toUpperCase()} · Giảm 5%</Badge>}

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, borderTop: '1px solid var(--stone-200)', paddingTop: 16 }}>
            <Row label="Tạm tính" value={vnd(original)}/>
            {savings > 0 && <Row label="Giảm giá sản phẩm" value={`− ${vnd(savings)}`} color="var(--accent-500)"/>}
            {couponDiscount > 0 && <Row label={`Mã ${coupon.toUpperCase()}`} value={`− ${vnd(couponDiscount)}`} color="var(--accent-500)"/>}
            <Row label="Phí vận chuyển" value={shipping === 0 ? 'Miễn phí' : vnd(shipping)}
                 color={shipping === 0 ? 'var(--success)' : undefined}/>
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
            borderTop: '1px solid var(--stone-200)', paddingTop: 16 }}>
            <span style={{ fontSize: 16, fontWeight: 600 }}>Tổng cộng</span>
            <span style={{ fontFamily: 'var(--font-serif)', fontSize: 28, fontWeight: 700, color: 'var(--brand-600)', fontVariantNumeric: 'tabular-nums' }}>{vnd(total)}</span>
          </div>
          <div style={{ fontSize: 12, color: 'var(--stone-500)', textAlign: 'right', marginTop: -8 }}>Đã bao gồm VAT</div>

          <Button variant="primary" size="lg" style={{ height: 52, fontSize: 16 }}
            onClick={() => location.href = './Checkout.html'}>Tiến hành thanh toán</Button>
          <Button variant="outline" size="lg" icon={<Icon.Phone width={18} height={18}/>} style={{ height: 48 }}>Liên hệ tư vấn</Button>

          <div style={{ display: 'flex', gap: 10, padding: 12, background: 'var(--stone-50)', borderRadius: 8, fontSize: 13, color: 'var(--stone-600)', lineHeight: '20px' }}>
            <Icon2.Check width={18} height={18} style={{ color: 'var(--success)', flexShrink: 0, marginTop: 1 }}/>
            Bảo hành chính hãng · Đổi trả trong 7 ngày · Hỗ trợ lắp đặt tận nơi
          </div>
        </aside>
      </div>
    )}
  </PageShell>;
}

function Row({ label, value, color }) {
  return <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14 }}>
    <span style={{ color: 'var(--stone-600)' }}>{label}</span>
    <span style={{ color: color ?? 'var(--stone-900)', fontWeight: 500, fontVariantNumeric: 'tabular-nums' }}>{value}</span>
  </div>;
}

// IconButton reused from components.jsx — already on window
ReactDOM.createRoot(document.getElementById('app')).render(<Cart/>);
</script>
</body></html>
